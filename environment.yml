# Standalone install — works without cloning the repo.
# Downloads matlab-mcp-python from PyPI.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate matlab-mcp
#   matlab-mcp --inspect
name: matlab-mcp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    - matlab-mcp-python[monitoring]
